<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - 1000 Malbecs</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .main-content {
      margin-left: 320px !important;
      max-width: 1100px;
    }
    @media (max-width: 768px) {
      .main-content { margin-left: 0 !important; }
    }

    .payment-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .payment-btn {
      padding: 16px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="topbar">
    <header class="header">
      <a href="/es/">
        <img src="/images/1000-malbecs-logo.png" alt="1000 Malbecs" class="logo">
      </a>
    </header>
    <!-- Carrito arriba a la derecha -->
    <a href="/es/carrito.html" style="position: relative; text-decoration: none; color: #4A2C59; font-size: 1.8em; margin-left: auto; padding-right: 30px;">
      🛒
      <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:#e74c3c; color:white; font-size:12px; font-weight:bold; min-width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; line-height:1;">0</span>
    </a>
  </div>

  <div class="main-content" style="margin: 60px auto; padding: 0 20px;">
    <h1 style="text-align:center; margin-bottom:40px; color:#4A2C59;">Checkout</h1>

    <div style="display: grid; grid-template-columns: 1fr 420px; gap: 50px;">

      <!-- COLUMNA IZQUIERDA -->
      <div>
        <!-- EXPRESS CHECKOUT -->
        <div style="background:#f9f9f9; padding:30px; border-radius:16px; margin-bottom:40px;">
          <h3 style="text-align:center; margin-bottom:20px;">Métodos de Pago</h3>
          
          <div class="payment-buttons">
            <button onclick="payWithStripe()" class="payment-btn" style="background:#635BFF; color:white;">
              💳 Tarjeta de Crédito
            </button>
            <button onclick="payWithPayPal()" class="payment-btn" style="background:#00457C; color:white;">
              PayPal
            </button>
            <button onclick="payWithWhatsApp()" class="payment-btn" style="background:#25D366; color:white;">
              WhatsApp
            </button>
            <button onclick="payWithEmail()" class="payment-btn" style="background:#1E88E5; color:white;">
              Transferencia Bancaria
            </button>
          </div>
        </div>

        <!-- CONTACTO -->
        <div style="margin-bottom:30px;">
          <h3>Contacto</h3>
          <input type="email" id="email" placeholder="Email" style="width:100%; padding:14px; border:1px solid #ccc; border-radius:8px; margin-bottom:15px;">
          <label>
            <input type="checkbox" id="createAccount"> Crear cuenta con este email
          </label>
        </div>

        <!-- ENTREGA -->
        <div>
          <h3>Entrega</h3>
          <div style="display:flex; gap:15px; margin-bottom:20px;">
            <div style="flex:1; border:2px solid #4A2C59; padding:20px; border-radius:12px; text-align:center; cursor:pointer;">
              Enviar a domicilio
            </div>
            <div style="flex:1; border:1px solid #ddd; padding:20px; border-radius:12px; text-align:center; cursor:pointer; opacity:0.6;">
              Click & Collect
            </div>
          </div>
        </div>
      </div>

      <!-- COLUMNA DERECHA - RESUMEN -->
      <div style="background:#f9f9f9; padding:25px; border-radius:16px; position:sticky; top:20px;">
        <h3>Resumen del pedido</h3>
        <div id="checkout-items"></div>

        <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:15px;">
          <div style="display:flex; justify-content:space-between;">
            <span>Subtotal</span>
            <span id="checkout-subtotal">€0.00</span>
          </div>
          <div style="display:flex; justify-content:space-between; margin:8px 0;">
            <span>Envío</span>
            <span id="checkout-shipping">Gratis</span>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:1.4rem; font-weight:700;">
            <span>Total</span>
            <span id="checkout-total">€0.00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/cart.js"></script>
  <script>
    function renderCheckoutSummary() {
      const container = document.getElementById('checkout-items');
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      let html = '';
      let subtotal = 0;

      cart.forEach(item => {
        const price = parseFloat(item.price) || 0;
        const qty = item.quantity || 1;
        subtotal += price * qty;
        html += `
          <div style="display:flex; gap:15px; margin-bottom:15px; align-items:center;">
            <img src="${item.image}" style="width:60px; height:60px; object-fit:cover; border-radius:6px;">
            <div style="flex:1;">
              <strong>${item.name}</strong><br>
              <small>${qty} × €${price.toFixed(2)}</small>
            </div>
            <div style="font-weight:600;">€${(price * qty).toFixed(2)}</div>
          </div>`;
      });

      container.innerHTML = html;

      const shipping = subtotal >= 120 ? 0 : 6.99;
      document.getElementById('checkout-subtotal').textContent = `€${subtotal.toFixed(2)}`;
      document.getElementById('checkout-shipping').textContent = shipping === 0 ? 'Gratis' : `€${shipping.toFixed(2)}`;
      document.getElementById('checkout-total').textContent = `€${(subtotal + shipping).toFixed(2)}`;
    }

    function payWithStripe() { alert("Redirigiendo a Stripe..."); }
    function payWithPayPal() { alert("Redirigiendo a PayPal..."); }
    function payWithWhatsApp() { alert("Abriendo WhatsApp..."); }
    function payWithEmail() { alert("Mostrando datos de transferencia..."); }

    window.onload = renderCheckoutSummary;
  </script>
</body>
</html>
