<script>
// ==================== HAMBURGER MENU ====================
const hamburger = document.querySelector('.hamburger');
const sidebar = document.getElementById('sidebar');

if (hamburger && sidebar) {
  hamburger.addEventListener('click', () => {
    const expanded = hamburger.getAttribute('aria-expanded') === 'true';
    hamburger.setAttribute('aria-expanded', !expanded);
    sidebar.classList.toggle('open');
  });

  document.addEventListener('click', (e) => {
    if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
      sidebar.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
    }
  });
}
  </script>
<!-- ==================== STRIPE PAYMENT ==================== -->
<script>
// Variables
let stripe;
let cardElement;
let clientSecret = null;

// ==================== CREAR PAYMENT INTENT ====================
async function createPaymentIntent() {
  const total = calculateTotal ? calculateTotal() : 2999;

  try {
    const response = await fetch('https://1000malbecs-pago.federico-augspach.workers.dev/create-payment-intent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: Math.round(total * 100) })
    });

    const data = await response.json();

    if (data.clientSecret) {
      clientSecret = data.clientSecret;
      console.log("✅ clientSecret recibido");
      return true;
    } else {
      throw new Error(data.error || "No se recibió clientSecret");
    }
  } catch (err) {
    console.error("Error creando PaymentIntent:", err);
    alert("Error al preparar el pago: " + err.message);
    return false;
  }
}

// ==================== INICIALIZACIÓN ====================
function initializeStripe() {
  if (stripe) return;

  stripe = Stripe('pk_live_51TbKblCWcVRBeV4kr6w33DAQZhI3QPhNdAqFhQoOQNjkerMrWHvjo1OFBSzDtZS3F31rJeYIMFk0Ws3n7CoYluo2002v6GBIKs');

  const elements = stripe.elements();

  cardElement = elements.create('card', {
    style: {
      base: {
        fontSize: '16px',
        color: '#32325d',
        fontFamily: '"Helvetica Neue", Helvetica, sans-serif',
        '::placeholder': { color: '#aab7c4' }
      }
    },
    hidePostalCode: true
  });

  cardElement.mount('#card-element');
}

// ==================== ABRIR FORMULARIO ====================
async function startStripePayment() {
  const formContainer = document.getElementById('stripe-checkout-form') || document.getElementById('stripe-form-container');

  if (!formContainer) {
    alert("No se encontró el formulario de pago");
    return;
  }

  const success = await createPaymentIntent();
  if (!success) return;

  formContainer.style.display = 'block';

  if (!stripe) initializeStripe();

  const totalEl = document.getElementById('checkout-total');
  const amountSpan = document.getElementById('final-total-amount');
  if (totalEl && amountSpan) {
    amountSpan.textContent = totalEl.textContent.replace('€', '').trim();
  }

  formContainer.scrollIntoView({ behavior: "smooth", block: "center" });
}

// ==================== PROCESAR PAGO ====================
async function payWithStripeCard() {
  if (!clientSecret) {
    alert("El pago no está preparado. Abre el formulario nuevamente.");
    return;
  }

  const email = document.getElementById('email').value.trim();
  const name = document.getElementById('customer-name').value.trim() || "Cliente";
  const address = document.getElementById('address').value.trim();
  const postalCode = document.getElementById('postal-code').value.trim();
  const city = document.getElementById('city').value.trim();
  const phone = document.getElementById('phone') ? document.getElementById('phone').value.trim() : '';
  const country = "DE";

  if (!email || !postalCode || !city) {
    alert("Por favor completa los campos obligatorios");
    return;
  }

  // Calcular shipping cost (igual que en cart.js)
  let totalBottles = 0;
  const cartItems = JSON.parse(localStorage.getItem('cart') || '[]');
  cartItems.forEach(item => {
    totalBottles += item.quantity || 1;
  });
  const shippingCost = totalBottles >= 12 ? 0 : 6.99;

  try {
    const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
      payment_method: {
        card: cardElement,
        billing_details: {
          name: name,
          email: email,
          phone: phone,
          address: {
            line1: address,
            city: city,
            postal_code: postalCode,
            country: country
          }
        }
      }
    });

    if (error) {
      alert(error.message || "Error en el pago");
    } else {
      console.log("✅ Pago confirmado:", paymentIntent);

      const orderData = {
        orderId: "ORD-" + Date.now().toString().slice(-8),
        date: new Date().toLocaleDateString('es-ES'),
        customer: { 
          name, 
          email, 
          phone, 
          address, 
          postalCode, 
          city, 
          country 
        },
        items: cartItems,
        total: document.getElementById('checkout-total').textContent,
        shippingCost: shippingCost,           // ← Ahora está definido
        paymentMethod: "Stripe",
        status: "Pagado",
        paymentIntentId: paymentIntent.id
      };

      localStorage.setItem('lastOrder', JSON.stringify(orderData));

      // Enviar emails
      try {
        await fetch('https://1000malbecs-pago.federico-augspach.workers.dev/send-order-emails', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });
        console.log("Emails enviados correctamente");
      } catch (e) {
        console.error("Error enviando emails:", e);
      }

      alert(`🎉 ¡Gracias ${name.split(" ")[0]}!\n\nTu pedido ha sido procesado correctamente.`);

      setTimeout(() => {
        window.location.href = `/es/pedido-confirmado.html?orderId=${orderData.orderId}`;
      }, 800);
    }
  } catch (err) {
    console.error(err);
    alert("Error al confirmar el pago");
  }
}
  // Hacer globales
window.startStripePayment = startStripePayment;
window.payWithStripeCard = payWithStripeCard;

console.log("✅ Stripe functions loaded");
</script>

    const cart = JSON.parse(localStorage.getItem('cart')) || [];

      subtotal += price * qty;

    });

    const shipping = totalBottles >= 12 ? 0 : 6.99;
    const finalTotal = subtotal + shipping;

    message += `\nSubtotal: €${subtotal.toFixed(2)}`;
    if (shipping === 0) message += `\n✅ Envío GRATIS`;
    else message += `\nEnvío: €${shipping.toFixed(2)}`;

    const url = `https://wa.me/4915158224728?text=${encodeURIComponent(message)}`;

<script>
// Esperar a que PayPal SDK cargue
function payWithPayPal() {
  const container = document.getElementById('paypal-button-container');
  if (!container) return;

  container.style.display = 'block';
  container.innerHTML = '<p style="text-align:center; padding:40px; color:#666;">Cargando PayPal...</p>';

  // Esperar hasta que PayPal esté disponible
  const checkPayPal = setInterval(() => {
    if (typeof paypal !== 'undefined') {
      clearInterval(checkPayPal);
      renderPayPalButton();
    }
  }, 300);
}

function renderPayPalButton() {
  const container = document.getElementById('paypal-button-container');
  if (!container) return;

  container.innerHTML = '';

  paypal.Buttons({
    style: {
      shape: 'rect',
      color: 'blue',
      layout: 'vertical',
      label: 'paypal'
    },

    createOrder: function(data, actions) {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      let totalBottles = 0;
      let subtotal = 0;

      cart.forEach(item => {
        const qty = item.quantity || 1;
        const price = parseFloat(item.price) || 0;
        totalBottles += qty;
        subtotal += price * qty;
      });

      const shippingCost = totalBottles >= 12 ? 0 : 6.99;
      const total = subtotal + shippingCost;

      return actions.order.create({
        purchase_units: [{
          amount: {
            value: total.toFixed(2),
            currency_code: 'EUR',
            breakdown: {
              item_total: { value: subtotal.toFixed(2), currency_code: 'EUR' },
              shipping: { value: shippingCost.toFixed(2), currency_code: 'EUR' }
            }
          }
        }]
      });
    },

    onApprove: async function(data, actions) {
      try {
        const order = await actions.order.capture();
        console.log("✅ Pago PayPal exitoso:", order);

        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let totalBottles = 0;
        cart.forEach(item => totalBottles += item.quantity || 1);
        const shippingCost = totalBottles >= 12 ? 0 : 6.99;

        const orderData = {
          orderId: "PP-" + order.id.slice(-8),
          date: new Date().toLocaleDateString('es-ES'),
          customer: {
            name: (order.payer?.name?.given_name || "") + " " + (order.payer?.name?.surname || "Cliente"),
            email: order.payer?.email_address || ""
          },
          items: cart,
          total: document.getElementById('checkout-total').textContent,
          shippingCost: shippingCost,
          paymentMethod: "PayPal",
          status: "Pagado",
          paymentId: order.id
        };

        localStorage.setItem('lastOrder', JSON.stringify(orderData));

        try {
          await fetch('https://1000malbecs-pago.federico-augspach.workers.dev/send-order-emails', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
          });
        } catch (e) {}

        alert("¡Pago con PayPal realizado con éxito!");
        window.location.href = `/es/pedido-confirmado.html?orderId=${orderData.orderId}`;

      } catch (err) {
        console.error(err);
        alert("Error al confirmar el pago con PayPal");
      }
    },

    onError: function(err) {
      console.error(err);
      alert("Error en el proceso de PayPal. Inténtalo de nuevo.");
    }
  }).render('#paypal-button-container');
}
</script>
  
  <script>
   // ==================== RENDER RESUMEN ====================
  function renderCheckoutCart() {
  const container = document.getElementById('checkout-items');
  if (!container) {
    console.error("❌ No se encontró #checkout-items");
    return;
  }

  const lang = getLang();
  const t = translations[lang] || translations.es;

  if (cart.length === 0) {
    container.innerHTML = `<p style="text-align:center; padding:50px;">${t.empty}</p>`;
    return;
  }

  let html = '';
  let subtotal = 0;
  let totalBottles = 0;

  cart.forEach(item => {
    const price = parseFloat(item.price) || 0;
    const qty = item.quantity || 1;
    const itemTotal = price * qty;
    subtotal += itemTotal;
    totalBottles += qty;

    html += `
      <div class="checkout-item">
        <img src="${item.image}" alt="${item.name}">
        <div class="item-details">
          <h4>${item.name}</h4>
          <p>${qty} × €${price.toFixed(2)}</p>
        </div>
        <div class="item-price">
          €${itemTotal.toFixed(2)}
        </div>
      </div>`;
  });

  const shippingCost = totalBottles >= 12 ? 0 : 6.99;
  const finalTotal = subtotal + shippingCost;

  container.innerHTML = html;

  // Actualizar totales
  document.getElementById('checkout-subtotal') && 
    (document.getElementById('checkout-subtotal').textContent = `€${subtotal.toFixed(2)}`);
  
  const shippingEl = document.getElementById('checkout-shipping');
  if (shippingEl) {
    shippingEl.innerHTML = shippingCost === 0 
      ? `<strong style="color:#27ae60;">${t.freeShipping}</strong>` 
      : `Envío: <strong>€${shippingCost.toFixed(2)}</strong>`;
  }

  document.getElementById('checkout-total') && 
    (document.getElementById('checkout-total').textContent = `€${finalTotal.toFixed(2)}`);
}
window.startStripePayment = startStripePayment;
window.payWithStripeCard = payWithStripeCard;
window.payWithPayPal = payWithPayPal;
window.payWithApplePay = payWithApplePay;
window.payWithGooglePay = payWithGooglePay;
window.payWithWhatsApp = payWithWhatsApp;
window.payWithEmail = payWithEmail;
</script>
