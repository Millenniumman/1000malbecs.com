<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido al Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: #1A0F0F;
      color: #f8f5f2;
      min-height: 100vh;
      margin-left: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: rgba(26, 15, 15, 0.95);
      padding: 60px 45px;
      border-radius: 20px;
      border: 1px solid #D4AF37;
      box-shadow: 0 25px 70px rgba(0,0,0,0.7);
      text-align: center;
    }
    h1 { font-family: 'Playfair Display', serif; color: #D4AF37; font-size: 2.8rem; margin-bottom: 20px; }
    p { font-size: 1.2rem; line-height: 1.7; color: #e0d0e0; margin-bottom: 30px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>

  <div class="card">
    <h1>¡Bienvenido al Lounge!</h1>
    <p id="status">Verificando tu cuenta...</p>
  </div>

  <script>
    console.log("🚀 Script de bienvenida cargado");

    const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
    const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    async function handleWelcome() {
      const statusEl = document.getElementById('status');

      try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
          statusEl.textContent = "No se encontró sesión. Redirigiendo...";
          window.location.href = '/es/lounge';
          return;
        }

        const user = session.user;
        console.log("Usuario confirmado:", user.email);

        const wantsNewsletter = user.user_metadata?.wants_newsletter === true;
        console.log("¿Quiere newsletter?", wantsNewsletter);

        statusEl.textContent = "Cuenta confirmada. Procesando...";

        if (wantsNewsletter && user.email) {
          statusEl.textContent = "Agregando a Mailchimp...";

          // ← Tus datos de Mailchimp aquí
          const MAILCHIMP_API_KEY = "6223844815d19c4eb330ecf4103c38bd-us5";   // ← Pega aquí tu API Key
          const MAILCHIMP_SERVER = "us5";                         // ← Cambia por tu server
          const MAILCHIMP_LIST_ID = "e4e709eda9";            // ← Pega tu List ID

          try {
            const response = await fetch(
              `https://${MAILCHIMP_SERVER}.api.mailchimp.com/3.0/lists/${MAILCHIMP_LIST_ID}/members?apikey=${MAILCHIMP_API_KEY}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  email_address: user.email,
                  status: "subscribed",
                  merge_fields: {
                    FNAME: user.user_metadata?.nombre || "",
                    LNAME: user.user_metadata?.apellido || ""
                  }
                })
              }
            );

            const result = await response.json();
            console.log("Respuesta Mailchimp:", result);

            if (response.ok) {
              statusEl.innerHTML = '<span class="success">✓ Agregado correctamente a Mailchimp</span>';
              console.log("🎉 Éxito en Mailchimp");
            } else {
              statusEl.innerHTML = '<span class="error">✗ Error en Mailchimp</span>';
              console.log("❌ Error:", result);
            }
          } catch (err) {
            statusEl.innerHTML = '<span class="error">✗ Error de conexión</span>';
            console.log("Error en fetch:", err);
          }
        } else {
          statusEl.textContent = "No se solicitó suscripción a newsletter.";
        }

      } catch (err) {
        console.error("Error general:", err);
        statusEl.textContent = "Error al procesar la sesión.";
      }

      // Redirección final
      setTimeout(() => {
        window.location.href = '/es/lounge';
      }, 4000);
    }

    handleWelcome();
  </script>
</body>
</html>
