<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido al Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #1A0F0F;
      color: #f8f5f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 140px;        /* ← Más espacio para barra de navegación fixed */
      padding-bottom: 40px;
      padding-left: 20px;
      padding-right: 20px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: rgba(26, 15, 15, 0.95);
      padding: 55px 40px;
      border-radius: 20px;
      border: 1px solid #D4AF37;
      box-shadow: 0 25px 70px rgba(0,0,0,0.7);
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #D4AF37;
      font-size: 2.85rem;
      margin-bottom: 18px;
    }
    p {
      font-size: 1.18rem;
      line-height: 1.7;
      color: #e0d0e0;
      margin-bottom: 35px;
    }
    .loading {
      color: #D4AF37;
      font-size: 1.1rem;
      margin-top: 15px;
    }

    @media (max-width: 768px) {
      body {
        padding-top: 120px;
        padding-left: 15px;
        padding-right: 15px;
      }
      .card {
        padding: 40px 25px;
      }
      h1 {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>¡Bienvenido al Lounge!</h1>
    <p>Tu cuenta ha sido confirmada correctamente.<br>
    Estamos preparando tu acceso exclusivo...</p>
    
    <div class="loading">Cargando tu experiencia personalizada...</div>
  </div>

  <script>
    const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
    const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';
    const sb = Supabase.createClient(supabaseUrl, supabaseKey);

    async function handleWelcome() {
      const { data: { session }, error } = await sb.auth.getSession();
      
      if (error || !session) {
        window.location.href = '/es/lounge';
        return;
      }

      const user = session.user;
      const wantsNewsletter = user.user_metadata?.wants_newsletter === true;

      // Agregar a Mailchimp si aceptó recibir emails
      if (wantsNewsletter && user.email) {
        try {
          await fetch('https://bnxwzlbxpgucciuvtski.supabase.co/functions/v1/add-to-mailchimp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: user.email,
              first_name: user.user_metadata?.nombre || '',
              last_name: user.user_metadata?.apellido || '',
              language: 'es'
            })
          });
          console.log("✅ Usuario agregado a Mailchimp");
        } catch (err) {
          console.log("⚠️ Error Mailchimp:", err);
        }
      }

      // Redirección al Lounge
      setTimeout(() => {
        window.location.href = '/es/lounge';
      }, 2400);
    }

    handleWelcome();
  </script>
</body>
</html>
