<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido al Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --malbec-dark: #1A0F0F;
      --gold: #D4AF37;
      --light: #f8f5f2;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #1A0F0F;
      color: #f8f5f2;
      min-height: 100vh;
      margin-left: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: rgba(26, 15, 15, 0.95);
      padding: 60px 45px;
      border-radius: 20px;
      border: 1px solid #D4AF37;
      box-shadow: 0 25px 70px rgba(0,0,0,0.7);
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #D4AF37;
      font-size: 2.85rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.7;
      color: #e0d0e0;
      margin-bottom: 30px;
    }
    .loading {
      color: #D4AF37;
      font-size: 1.15rem;
      margin-top: 20px;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 280px;
      right: 0;
      background: #f8f5f2 !important;
      color: #333;
      padding: 25px 20px;
      text-align: center;
      font-size: 0.95rem;
      z-index: 100;
    }

    @media (max-width: 992px) {
      body { margin-left: 0; }
      footer { left: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>¡Bienvenido al Lounge!</h1>
    <p>Tu cuenta ha sido confirmada correctamente.<br>
    Estamos preparando tu acceso exclusivo...</p>
    
    <div class="loading">Cargando tu experiencia personalizada...</div>
  </div>

  <script>
    const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
    const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';
    
    // ← CORRECCIÓN AQUÍ: "supabase" con s minúscula
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    async function handleWelcome() {
      console.log("Iniciando página de bienvenida...");

      const { data: { session }, error } = await sb.auth.getSession();
      
      if (error || !session) {
        console.log("No session found, redirecting to lounge");
        window.location.href = '/es/lounge';
        return;
      }

      const user = session.user;
      console.log("Usuario confirmado:", user.email);

      const wantsNewsletter = user.user_metadata?.wants_newsletter === true;

      if (wantsNewsletter && user.email) {
        console.log("Usuario quiere newsletter → llamando a Mailchimp");
        try {
          const response = await fetch('https://bnxwzlbxpgucciuvtski.supabase.co/functions/v1/add-to-mailchimp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: user.email,
              first_name: user.user_metadata?.nombre || '',
              last_name: user.user_metadata?.apellido || '',
              language: 'es'
            })
          });

          if (response.ok) {
            console.log("✅ Usuario agregado correctamente a Mailchimp");
          } else {
            console.log("❌ Error en respuesta de Mailchimp");
          }
        } catch (err) {
          console.log("⚠️ Error al llamar a Mailchimp:", err);
        }
      } else {
        console.log("Usuario NO marcó la casilla de newsletter");
      }

      console.log("Redirigiendo al lounge en 2.5 segundos...");
      setTimeout(() => {
        window.location.href = '/es/lounge';
      }, 2500);
    }

    handleWelcome();
  </script>
</body>
</html>
