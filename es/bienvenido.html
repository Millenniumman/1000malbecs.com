<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido al Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: #1A0F0F;
      color: #f8f5f2;
      min-height: 100vh;
      margin-left: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: rgba(26, 15, 15, 0.95);
      padding: 60px 45px;
      border-radius: 20px;
      border: 1px solid #D4AF37;
      box-shadow: 0 25px 70px rgba(0,0,0,0.7);
      text-align: center;
    }
    h1 { font-family: 'Playfair Display', serif; color: #D4AF37; font-size: 2.85rem; margin-bottom: 20px; }
    p { font-size: 1.2rem; line-height: 1.7; color: #e0d0e0; margin-bottom: 30px; }
  </style>
</head>
<body>

  <div class="card">
    <h1>¡Bienvenido al Lounge!</h1>
    <p>Tu cuenta ha sido confirmada correctamente.<br>
    Estamos preparando tu acceso exclusivo...</p>
  </div>

  <script>
    console.log("🚀 Script de bienvenida cargado correctamente");

    const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
    const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    console.log("✅ Cliente Supabase creado");

    async function handleWelcome() {
      console.log("🔄 Iniciando handleWelcome...");

      const { data: { session }, error } = await sb.auth.getSession();
      
      if (error || !session) {
        console.log("❌ No hay sesión activa");
        window.location.href = '/es/lounge';
        return;
      }

      const user = session.user;
      console.log("✅ Usuario confirmado:", user.email);

      const wantsNewsletter = user.user_metadata?.wants_newsletter === true;
      console.log("¿Quiere newsletter?", wantsNewsletter);

      if (wantsNewsletter && user.email) {
        console.log("📧 Intentando agregar a Mailchimp directamente...");


        // Llamada directa a Mailchimp usando query parameter (método alternativo)
        const MAILCHIMP_API_KEY = "6223844815d19c4eb330ecf4103c38bd-us5";   // ← Pega aquí tu API Key completa
        const MAILCHIMP_SERVER = "us5";                // ← Cambia por tu server
        const MAILCHIMP_LIST_ID = "e4e709eda9";   // ← Cambia por tu List ID

               try {
          const response = await fetch(
            `https://${MAILCHIMP_SERVER}.api.mailchimp.com/3.0/lists/${MAILCHIMP_LIST_ID}/members?apikey=${MAILCHIMP_API_KEY}`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email_address: user.email,
                status: "subscribed",
                merge_fields: {
                  FNAME: user.user_metadata?.nombre || "",
                  LNAME: user.user_metadata?.apellido || ""
                }
              })
            }
          );

          const result = await response.json();
          console.log("Respuesta directa de Mailchimp:", result);

          if (response.ok) {
            console.log("🎉 ¡Usuario agregado correctamente a Mailchimp!");
          } else {
            console.log("❌ Error en Mailchimp:", result);
          }
        } catch (err) {
          console.log("⚠️ Error en llamada directa a Mailchimp:", err);
        }
      } else {
        console.log("ℹ️ El usuario NO marcó la casilla de newsletter");
      }

      console.log("🔄 Redirigiendo al lounge en 3 segundos...");
      setTimeout(() => {
        window.location.href = '/es/lounge';
      }, 3000);
    }

    handleWelcome();
  </script>
</body>
</html>
