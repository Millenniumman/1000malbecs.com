<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido al Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: #1A0F0F;
      color: #f8f5f2;
      min-height: 100vh;
      margin-left: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 680px;
      width: 100%;
      background: rgba(26, 15, 15, 0.95);
      padding: 60px 50px;
      border-radius: 20px;
      border: 1px solid #D4AF37;
      box-shadow: 0 25px 70px rgba(0,0,0,0.7);
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #D4AF37;
      font-size: 2.8rem;
      margin-bottom: 25px;
    }
    p {
      font-size: 1.25rem;
      line-height: 1.7;
      color: #e0d0e0;
      margin-bottom: 30px;
    }
    .status {
      margin: 25px 0;
      font-size: 1.1rem;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>

  <div class="card">
    <h1>¡Bienvenido al Lounge!</h1>
    <p id="status">Verificando tu cuenta y procesando suscripción...</p>
  </div>

  <script>
    console.log("🚀 Script de bienvenida cargado correctamente");

    const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
    const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';   // ← asegúrate que sea tu anon key

    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    async function handleWelcome() {
      const statusEl = document.getElementById('status');

      try {
        const { data: { session }, error } = await sb.auth.getSession();

        if (error || !session) {
          statusEl.textContent = "No se encontró sesión activa. Redirigiendo...";
          setTimeout(() => window.location.href = '/es/lounge', 2000);
          return;
        }

        const user = session.user;
        console.log("✅ Usuario confirmado:", user.email);

        const wantsNewsletter = user.user_metadata?.wants_newsletter === true;
        console.log("¿Quiere newsletter?", wantsNewsletter);

        statusEl.textContent = "Cuenta confirmada correctamente.";

        if (wantsNewsletter && user.email) {
          statusEl.innerHTML = 'Agregando a la lista de Mailchimp <span style="color:#D4AF37;">...</span>';

          try {
            const response = await fetch('https://bnxwzlbxpgucciuvtski.supabase.co/functions/v1/add-to-mailchimp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: user.email,
                first_name: user.user_metadata?.nombre || '',
                last_name: user.user_metadata?.apellido || '',
                language: 'es'
              })
            });

            console.log("Status de respuesta:", response.status);

            const result = await response.json();
            console.log("Respuesta completa de Mailchimp:", result);

            if (response.ok) {
              statusEl.innerHTML = '<span class="success">✓ Agregado correctamente a Mailchimp</span>';
              console.log("🎉 Éxito en Mailchimp");
            } else {
              statusEl.innerHTML = `<span class="error">✗ Error al agregar a Mailchimp (${response.status})</span>`;
              console.log("❌ Error:", result);
            }
          } catch (fetchError) {
            console.log("⚠️ Error en la llamada fetch:", fetchError);
            statusEl.innerHTML = '<span class="error">✗ Error de conexión con Mailchimp</span>';
          }
        } else {
          statusEl.textContent = "No se solicitó suscripción al newsletter.";
        }

      } catch (err) {
        console.error("Error general:", err);
        statusEl.textContent = "Ocurrió un error al procesar la cuenta.";
      }

      // Redirección final
      console.log("🔄 Redirigiendo al lounge en 4 segundos...");
      setTimeout(() => {
        window.location.href = '/es/lounge';
      }, 4000);
    }

    // Ejecutar cuando la página esté completamente cargada
    window.addEventListener('load', handleWelcome);
  </script>
</body>
</html>
