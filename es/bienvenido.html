<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido al Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Montserrat', sans-serif; background: #1A0F0F; color: #f8f5f2; min-height: 100vh; margin-left: 280px; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { max-width: 680px; width: 100%; background: rgba(26, 15, 15, 0.95); padding: 60px 50px; border-radius: 20px; border: 1px solid #D4AF37; box-shadow: 0 25px 70px rgba(0,0,0,0.7); text-align: center; }
    h1 { font-family: 'Playfair Display', serif; color: #D4AF37; font-size: 2.8rem; margin-bottom: 25px; }
    p { font-size: 1.25rem; line-height: 1.7; color: #e0d0e0; margin-bottom: 30px; }
    .status { margin: 25px 0; font-size: 1.15rem; }
    .success { color: #4ade80; }
  </style>
</head>
<body>

  <div class="card">
    <h1>¡Bienvenido al Lounge!</h1>
    <p id="status">Verificando tu cuenta...</p>
  </div>

  <script>
    console.log("🚀 Script de bienvenida cargado");

    const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
    const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';

    const sb = supabase.createClient(supabaseUrl, supabaseKey);

   <script>
async function handleWelcome() {
  const statusEl = document.getElementById('status');

  try {
    const userEmail = 'ventas@1000malbecs.com'; // reemplazar con user.email real si tienes metadata
    const firstName = 'Nombre'; // user.user_metadata?.nombre
    const lastName = 'Apellido'; // user.user_metadata?.apellido

    statusEl.textContent = "¡Cuenta confirmada correctamente!";

    // Llamada a la Edge Function pública sin JWT
    statusEl.innerHTML += '<br><span class="status">Agregando a Mailchimp...</span>';

    const response = await fetch('https://bnxwzlbxpgucciuvtski.supabase.co/functions/v1/welcome-lounge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: userEmail,
        first_name: firstName,
        last_name: lastName
      })
    });

    const result = await response.json();
    console.log("Respuesta Edge Function:", result);

    if (response.ok) {
      statusEl.innerHTML += '<br><span class="success">✓ Agregado correctamente a Mailchimp</span>';
    } else {
      statusEl.innerHTML += '<br><span class="error">✗ Error al agregar a Mailchimp</span>';
    }

  } catch (err) {
    statusEl.innerHTML += '<br><span class="error">✗ Error de conexión</span>';
    console.log("Error:", err);
  }
}
window.addEventListener('load', handleWelcome);
  </script>
</body>
</html>
