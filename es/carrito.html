<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; margin:0; padding:0; background:#fdfdfd; }
    main { max-width: 900px; margin: 120px auto 60px; padding: 20px; }
    h1 { color: #4A2C59; text-align: center; margin-bottom: 30px; }
    .cart-item { display: flex; align-items: center; background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .cart-item img { width: 90px; height: 90px; object-fit: contain; margin-right: 20px; }
    .item-info { flex: 1; }
    .quantity-controls { display: flex; align-items: center; gap: 10px; margin: 0 20px; }
    .quantity-controls button { width: 32px; height: 32px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .total { font-size: 1.5em; font-weight: 700; color: #4A2C59; text-align: right; margin: 40px 0; }
  </style>
</head>
<body>
  <main>
    <h1>Tu Carrito</h1>
    <div id="cart-items"></div>
    <div id="cart-total" class="total"></div>
    <a href="#" class="btn-checkout" onclick="goToCheckout()" style="display:block; background:#4A2C59; color:white; padding:16px; text-align:center; border-radius:10px; max-width:400px; margin:30px auto; text-decoration:none;">Ir a Pagar</a>
  </main>

  <script src="/js/cart.js"></script>
  <script>
    function renderCart() {
      const container = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      if (cart.length === 0) {
        container.innerHTML = `<p>Tu carrito está vacío.</p>`;
        return;
      }

      let html = '';
      let total = 0;

      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        html += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}">
            <div class="item-info">
              <h4>${item.name}</h4>
              <p>€${item.price.toFixed(2)} x ${item.quantity}</p>
            </div>
            <div style="text-align:right;">
              <strong>€${itemTotal.toFixed(2)}</strong>
            </div>
          </div>`;
      });

      container.innerHTML = html;
      totalEl.innerHTML = `Total: <strong>€${total.toFixed(2)}</strong>`;
    }

    function goToCheckout() {
      alert("Próximamente: Checkout con Stripe");
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
