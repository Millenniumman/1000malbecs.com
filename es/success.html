<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! - 1000 Malbecs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding: 80px 20px;
            background: #fdfdfd;
            color: #4A2C59;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 700px; }
        .success-icon { font-size: 90px; margin-bottom: 20px; }
        h1 { font-size: 2.4em; margin-bottom: 15px; }
        p { font-size: 1.15em; line-height: 1.6; margin-bottom: 25px; }
        .order-info {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 12px;
            margin: 30px 0;
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        a {
            display: inline-block;
            background: #4A2C59;
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🎉</div>
        <h1>¡Gracias por tu compra, <span id="customer-name">Cliente</span>!</h1>
        <p id="mensaje">Tu pedido ha sido recibido correctamente.</p>
        
        <div class="order-info">
            <strong>Email:</strong> <span id="customer-email"></span><br><br>
            <strong>Referencia:</strong> <span id="referencia"></span>
        </div>

        <p>Recibirás un email de confirmación en breve con todos los detalles.<br>
        En las próximas 48 horas te enviaremos la información del envío.</p>

        <a href="/es/">Volver al inicio</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const name  = urlParams.get('customer_name') || 'Cliente';
        const email = urlParams.get('customer_email') || '';
        const sessionId = urlParams.get('session_id');

        // Mostrar datos
        document.getElementById('customer-name').textContent = name;
        document.getElementById('customer-email').textContent = email || 'No disponible';
        document.getElementById('referencia').textContent = sessionId || 'Procesado';

        console.log("✅ Pedido recibido de:", name, email);
    </script>
</body>
</html>
