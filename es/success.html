<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! - 1000 Malbecs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding: 80px 20px;
            background: #fdfdfd;
            color: #4A2C59;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
        }
        .success-icon { font-size: 90px; margin-bottom: 20px; }
        h1 { font-size: 2.4em; margin-bottom: 15px; }
        p { font-size: 1.15em; line-height: 1.6; margin-bottom: 25px; }
        .order-info {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin: 25px 0;
            font-size: 1em;
        }
        a {
            display: inline-block;
            background: #4A2C59;
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🎉</div>
        <h1>¡Gracias por tu compra!</h1>
        <p id="mensaje">Tu pago ha sido procesado correctamente.</p>
        
        <div class="order-info" id="order-info" style="display:none;">
            <strong>Referencia:</strong> <span id="referencia"></span><br>
            <strong>Método de pago:</strong> <span id="metodo"></span>
        </div>

        <p>Recibirás un email de confirmación en breve.<br>
        En las próximas 48 horas te enviaremos los detalles del envío.</p>

        <a href="/es/">Volver al inicio</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const sessionId = urlParams.get('session_id');     // Stripe
        const orderId   = urlParams.get('order_id');       // PayPal
        const payment   = urlParams.get('payment');        // PayPal (para identificar)

        const mensaje = document.getElementById('mensaje');
        const orderInfo = document.getElementById('order-info');
        const referencia = document.getElementById('referencia');
        const metodo = document.getElementById('metodo');

        if (sessionId) {
            // === Stripe ===
            mensaje.textContent = "Tu pago con Stripe se ha completado con éxito.";
            metodo.textContent = "Stripe (Tarjeta)";
            referencia.textContent = sessionId;
            orderInfo.style.display = "block";
        } 
        else if (orderId || payment === 'paypal') {
            // === PayPal ===
            mensaje.textContent = "Tu pago con PayPal se ha completado con éxito.";
            metodo.textContent = "PayPal";
            referencia.textContent = orderId || "Confirmado";
            orderInfo.style.display = "block";
        }
    </script>
</body>
</html>
