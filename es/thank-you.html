<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias por tu compra - 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background: #fdfdfd;
      color: #333;
      line-height: 1.6;
    }
    main {
      max-width: 700px;
      margin: 100px auto 60px;
      padding: 20px;
      text-align: center;
    }
    .icon { font-size: 72px; margin-bottom: 20px; }
    h1 { color: #4A2C59; font-size: 2.2em; margin-bottom: 15px; }
    .order-number {
      background: #f8f8f8;
      padding: 12px 24px;
      border-radius: 8px;
      display: inline-block;
      margin: 20px 0;
      font-weight: 600;
      color: #4A2C59;
    }
    .summary, .shipping-box {
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 25px;
      margin: 30px 0;
      text-align: left;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      margin: 10px 8px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-primary { background: #4A2C59; color: white; }
    .btn-primary:hover { background: #5A1D39; }
    .btn-secondary { background: transparent; color: #4A2C59; border: 2px solid #4A2C59; }
  </style>
</head>
<body>
  <main>
    <div class="icon">🎉</div>
    <h1>¡Gracias por tu compra!</h1>
    <p>Tu pedido ha sido confirmado y está siendo preparado.</p>

    <div class="order-number">
      Pedido #<span id="order-number">CARGANDO...</span>
    </div>

    <div class="summary" id="order-summary">
      <p>Cargando detalles del pedido...</p>
    </div>

    <div class="shipping-box" id="shipping-info">
      <p>Cargando dirección de envío...</p>
    </div>

    <div>
      <a href="#" onclick="downloadInvoice()" class="btn btn-primary">Descargar Factura</a>
      <a href="/es/" class="btn btn-secondary">Volver a la Tienda</a>
    </div>
  </main>

<script>
async function retrieveSession() {
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get('session_id');

  console.log("Session ID recibido:", sessionId);

  if (!sessionId) {
    document.getElementById('order-summary').innerHTML = "<p style='color:red;'>Error: No se encontró el ID de la sesión.</p>";
    return;
  }

  try {
    const response = await fetch('https://1000malbecs-pago.federico-augspach.workers.dev/get-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });

    const data = await response.json();
    console.log("Datos recibidos de Stripe:", data);

    // Número de pedido
    document.getElementById('order-number').textContent = data.id?.slice(-8) || sessionId.slice(-8);

    // Resumen del pedido
    let html = `<h3>Resumen del pedido</h3>`;
    if (data.items && data.items.length > 0) {
      data.items.forEach(item => {
        html += `<p>${item.quantity} × ${item.description || 'Producto'} — €${(item.amount/100).toFixed(2)}</p>`;
      });
    }
    html += `<hr><p><strong>Total: €${((data.total || 0) / 100).toFixed(2)}</strong></p>`;
    document.getElementById('order-summary').innerHTML = html;

        // Dirección de envío
    if (data.shipping_details && data.shipping_details.address) {
      const sd = data.shipping_details;
      document.getElementById('shipping-info').innerHTML = `
        <strong>Dirección de envío:</strong><br>
        ${sd.name || 'Sin nombre'}<br>
        ${sd.address.line1 || ''}<br>
        ${sd.address.line2 ? sd.address.line2 + '<br>' : ''}
        ${sd.address.city || ''} ${sd.address.postal_code || ''}<br>
        ${sd.address.country || ''}
      `;
    } else if (data.shipping_details) {
      document.getElementById('shipping-info').innerHTML = `
        <strong>Dirección de envío:</strong><br>
        ${data.shipping_details.name || 'Sin nombre'}
      `;
    } else {
      document.getElementById('shipping-info').innerHTML = `<p><em>No se recibió dirección de envío.</em></p>`;
    }

    // Vaciar carrito
    localStorage.removeItem('cart');

  } catch (e) {
    console.error("Error al recuperar sesión:", e);
    document.getElementById('order-summary').innerHTML = `<p style='color:red;'>Error al cargar los detalles del pedido.</p>`;
  }
}

document.addEventListener('DOMContentLoaded', retrieveSession);

function downloadInvoice() {
  alert("Descargando factura...");
}
</script>
</body>
</html>
