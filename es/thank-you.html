<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias por tu compra - 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background: #fdfdfd;
      color: #333;
      line-height: 1.6;
    }
    main {
      max-width: 700px;
      margin: 100px auto 60px;
      padding: 20px;
      text-align: center;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 20px;
    }
    h1 {
      color: #4A2C59;
      font-size: 2.2em;
      margin-bottom: 15px;
    }
    .order-number {
      background: #f8f8f8;
      padding: 12px 24px;
      border-radius: 8px;
      display: inline-block;
      margin: 20px 0;
      font-weight: 600;
      color: #4A2C59;
    }
    .summary {
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 25px;
      margin: 30px 0;
      text-align: left;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      margin: 10px 8px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #4A2C59;
      color: white;
    }
    .btn-primary:hover {
      background: #5A1D39;
    }
    .btn-secondary {
      background: transparent;
      color: #4A2C59;
      border: 2px solid #4A2C59;
    }
    .create-account {
      margin-top: 40px;
      padding: 20px;
      background: #f8f8f8;
      border-radius: 10px;
    }
    * Mantengo los mismos estilos que te di antes (los resumo para no repetir) */
    
    h1 { color: #4A2C59; font-size: 2.2em; margin-bottom: 15px; }

  </style>
</head>
<body>
  <body>
  <main>
    <div class="icon">🎉</div>
    <h1 id="thank-title">Vielen Dank für deinen Kauf!</h1>
    <p id="thank-subtitle">Deine Bestellung wurde bestätigt.</p>

    <div class="order-number">
      Bestellung #<span id="order-number">WIRD GELADEN...</span>
    </div>

    <div class="summary" id="order-summary">
      <p>Lade Bestelldetails...</p>
    </div>

    <div>
      <a href="#" onclick="downloadInvoice()" class="btn btn-primary">Rechnung herunterladen</a>
      <a href="/de/" class="btn btn-secondary">Zurück zum Shop</a>
    </div>

    <div class="create-account" style="margin-top:40px; padding:20px; background:#f8f8f8; border-radius:10px;">
      <h3 id="account-title">Konto erstellen?</h3>
      <p id="account-text">Für einfache Nachverfolgung und zukünftige Bestellungen.</p>
      <a href="#" id="create-account-btn" class="btn btn-primary">Konto erstellen</a>
    </div>
  </main>

<script src="https://js.stripe.com/v3/"></script>
<script>
// === CONFIGURA TU CLAVE PUBLICA DE STRIPE ===
const stripe = Stripe('pk_live_tu_clave_publica_aqui');   // ← Cambia esto

async function retrieveSession() {
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get('session_id');

  if (!sessionId) {
    document.getElementById('order-summary').innerHTML = "<p style='color:red;'>Error: No se encontró sesión de pago.</p>";
    return;
  }

  try {
    // Aquí normalmente harías una llamada a TU BACKEND para verificar la sesión
    // Ejemplo con fetch (recomendado):
    const response = await fetch('/api/retrieve-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });

    const data = await response.json();

    // Rellenar la página
    document.getElementById('order-number').textContent = data.orderId || sessionId.slice(-8);
    document.getElementById('create-account-btn').href = `/register.html?email=${encodeURIComponent(data.customer_email)}`;

    let html = `<h3>Bestellübersicht</h3>`;
    data.items.forEach(item => {
      html += `<p>${item.quantity} × ${item.description} — €${item.amount/100}</p>`;
    });
    html += `<hr><p><strong>Gesamt: €${data.total/100}</strong></p>`;
    document.getElementById('order-summary').innerHTML = html;

  } catch (error) {
    console.error(error);
    document.getElementById('order-summary').innerHTML = "<p>Es gab ein Problem beim Laden der Bestellung.</p>";
  }
}

// Ejecutar al cargar
document.addEventListener('DOMContentLoaded', () => {
  const lang = document.documentElement.lang || 'de';
  // Aquí puedes llamar a setThankYouLanguage(lang) si quieres multi-idioma completo
  retrieveSession();
});
</script>
</body>
</html>
