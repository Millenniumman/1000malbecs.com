<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to the Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Misma CSS que en español */
    body { font-family: 'Montserrat', sans-serif; background: #1A0F0F; color: #f8f5f2; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px; }
    .card { max-width: 680px; width: 100%; background: rgba(26,15,15,0.95); padding: 60px 50px; border-radius: 20px; border: 1px solid #D4AF37; text-align: center; }
    h1 { font-family: 'Playfair Display', serif; color: #D4AF37; font-size: 2.8rem; margin-bottom: 25px; }
    p { font-size: 1.25rem; line-height: 1.7; color: #e0d0e0; margin-bottom: 30px; }
    .status { margin: 25px 0; font-size: 1.15rem; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Willkommen im Lounge!</h1>
    <p id="status">Überprüfe dein Konto...</p>
  </div>

 <script>
const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';
const sb = supabase.createClient(supabaseUrl, supabaseKey);

async function handleWelcome() {
  const statusEl = document.getElementById('status');

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = '/de/lounge';
      return;
    }

    // Limpiamos la URL de tokens
    window.history.replaceState({}, document.title, window.location.pathname);

    const user = session.user;
    const userEmail = user.email;
    const firstName = user.user_metadata?.nombre || '';
    const lastName = user.user_metadata?.apellido || '';
    const wantsNewsletter = user.user_metadata?.wants_newsletter === true;

    statusEl.textContent = "Dein Konto wurde bestätigt!";

    if (wantsNewsletter && userEmail) {
      statusEl.innerHTML += '<br><span class="status">Adding to Mailchimp...</span>';

      try {
        const response = await fetch(
          'https://bnxwzlbxpgucciuvtski.supabase.co/functions/v1/welcome-lounge',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`
            },
            body: JSON.stringify({
              email: userEmail,
              first_name: firstName,
              last_name: lastName,
              language: 'DE'   // ← aquí el idioma
            })
          }
        );

        const result = await response.json();
        console.log("Mailchimp result:", result);

        if (response.ok && result.success) {
          statusEl.innerHTML += '<br><span class="success">✓ Erfolgreich zu Mailchimp hinzugefügt</span>';
        } else {
          statusEl.innerHTML += '<br><span class="error">✗ Fehler beim Hinzufügen zu Mailchimp</span>';
        }
      } catch (err) {
        statusEl.innerHTML += '<br><span class="error">✗ Fehler beim Hinzufügen zu Mailchimp</span>';
        console.error(err);
      }
    }

  } catch (err) {
    console.error("Error in handleWelcome:", err);
    statusEl.innerHTML += '<br><span class="error">✗ Interner Fehler</span>';
  }

  // Redirige después de unos segundos
  setTimeout(() => window.location.href = '/de/lounge', 4000);
}

window.addEventListener('load', handleWelcome);
</script>
</body>
</html>
