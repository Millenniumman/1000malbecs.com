<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Willkommen im Lounge | 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
   body {
      font-family: 'Montserrat', sans-serif;
      background: #1A0F0F;
      color: #f8f5f2;
      min-height: 100vh;
      margin-left: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 680px;
      width: 100%;
      background: rgba(26, 15, 15, 0.95);
      padding: 60px 50px;
      border-radius: 20px;
      border: 1px solid #D4AF37;
      box-shadow: 0 25px 70px rgba(0,0,0,0.7);
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #D4AF37;
      font-size: 2.8rem;
      margin-bottom: 25px;
    }
    p {
      font-size: 1.25rem;
      line-height: 1.7;
      color: #e0d0e0;
      margin-bottom: 30px;
    }
    .status { margin: 25px 0; font-size: 1.15rem; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Willkommen im Lounge!</h1>
    <p id="status">Überprüfe dein Konto...</p>
  </div>

<script>
console.log("🚀 Script de bienvenida cargado");

const supabaseUrl = 'https://bnxwzlbxpgucciuvtski.supabase.co';
const supabaseKey = 'sb_publishable_N0FWBojsv8nTNEAAJLAtcg_nPriMs3x';
const sb = supabase.createClient(supabaseUrl, supabaseKey);

// 🔥 CRÍTICO: procesar token del email correctamente
sb.auth.onAuthStateChange((event, session) => {
  if (session && window.location.hash.includes('access_token')) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }
});

async function handleWelcome() {
  const statusEl = document.getElementById('status');

  try {
    // 🔥 CRÍTICO: esperar a que Supabase procese el token
    if (window.location.hash.includes('access_token')) {
      await new Promise(resolve => setTimeout(resolve, 500));
    }

    const { data: { session } } = await sb.auth.getSession();

    if (!session) {
      window.location.href = '/de/lounge';
      return;
    }

    const user = session.user;
    const userEmail = user.email;
    const firstName = user.user_metadata?.nombre || '';
    const lastName = user.user_metadata?.apellido || '';
    const wantsNewsletter = user.user_metadata?.wants_newsletter === true;

    console.log("Usuario:", userEmail);
    console.log("Newsletter:", wantsNewsletter);

    statusEl.textContent = "Dein Konto wurde bestätigt!";

    if (wantsNewsletter && userEmail) {
      statusEl.innerHTML += '<br><span class="status">Wird zu Mailchimp hinzugefügt...</span>';

      try {
        const response = await fetch(
          'https://bnxwzlbxpgucciuvtski.supabase.co/functions/v1/welcome-lounge',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`
            },
            body: JSON.stringify({
              email: userEmail,
              first_name: firstName,
              last_name: lastName,
              language: 'DE' // 👈 clave para segmentación
            })
          }
        );

        const result = await response.json();
        console.log("Respuesta Edge Function:", result);

        if (response.ok) {
          statusEl.innerHTML += '<br><span class="success">✓ Erfolgreich zu Mailchimp hinzugefügt</span>';
        } else {
          statusEl.innerHTML += '<br><span class="error">✗ Fehler beim Hinzufügen</span>';
        }

      } catch (err) {
        statusEl.innerHTML += '<br><span class="error">✗ Verbindungsfehler</span>';
        console.error(err);
      }
    }

  } catch (err) {
    console.error("Error en handleWelcome:", err);
  }

  setTimeout(() => window.location.href = '/de/lounge', 4000);
}

window.addEventListener('load', handleWelcome);
</script>
</body>
</html>
