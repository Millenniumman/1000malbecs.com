<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warenkorb - 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background: #fdfdfd; }
    main { max-width: 900px; margin: 100px auto 40px; padding: 20px; }
    h1 { color: #4A2C59; text-align: center; margin-bottom: 30px; }
    .cart-item {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-right: 15px;
    }
    .item-info { flex: 1; }
    .item-info h4 { margin: 0 0 5px 0; color: #4A2C59; }
    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 15px;
    }
    .quantity-controls button {
      width: 28px; height: 28px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .total {
      font-size: 1.4em;
      font-weight: 700;
      color: #4A2C59;
      text-align: right;
      margin: 30px 0;
    }
    .empty-cart {
      text-align: center;
      padding: 60px 20px;
      color: #777;
    }
    .btn-checkout {
      display: block;
      width: 100%;
      max-width: 400px;
      margin: 30px auto;
      padding: 16px;
      background: #4A2C59;
      color: white;
      text-align: center;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
  </head>
<body>
  <main>
    <h1>Ihr Warenkorb</h1>
    <div id="cart-items"></div>
    <div id="cart-total" class="total"></div>
    <a href="#" id="checkout-btn" class="btn-checkout" onclick="goToCheckout()">Zur Kasse gehen</a>
    <a href="/de/" style="display:block; text-align:center; margin-top:20px; color:#666;">← Weiter einkaufen</a>
  </main>

  <script src="/js/cart.js"></script>
</body>
</html>
