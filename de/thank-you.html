<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias por tu compra - 1000 Malbecs</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background: #fdfdfd;
      color: #333;
      line-height: 1.6;
    }
    main {
      max-width: 700px;
      margin: 100px auto 60px;
      padding: 20px;
      text-align: center;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 20px;
    }
    h1 {
      color: #4A2C59;
      font-size: 2.2em;
      margin-bottom: 15px;
    }
    .order-number {
      background: #f8f8f8;
      padding: 12px 24px;
      border-radius: 8px;
      display: inline-block;
      margin: 20px 0;
      font-weight: 600;
      color: #4A2C59;
    }
    .summary {
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 25px;
      margin: 30px 0;
      text-align: left;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .shipping-box {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 20px;
      margin: 25px 0;
      text-align: left;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      margin: 10px 8px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #4A2C59;
      color: white;
    }
    .btn-primary:hover {
      background: #5A1D39;
    }
    .btn-secondary {
      background: transparent;
      color: #4A2C59;
      border: 2px solid #4A2C59;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon">🎉</div>
    <h1 id="thank-title">Vielen Dank für deinen Kauf!</h1>
    <p id="thank-subtitle">Deine Bestellung wurde bestätigt und wird vorbereitet.</p>

    <div class="order-number">
      Bestellung #<span id="order-number">WIRD GELADEN...</span>
    </div>

    <div class="summary" id="order-summary">
      <p>Lade Bestelldetails...</p>
    </div>

    <!-- Datos de envío -->
    <div class="shipping-box" id="shipping-info">
      <p>Lade Versandadresse...</p>
    </div>

    <div>
      <a href="#" onclick="downloadInvoice()" class="btn btn-primary">Rechnung herunterladen</a>
      <a href="/de/" class="btn btn-secondary">Zurück zum Shop</a>
    </div>

    <div class="create-account" style="margin-top:40px; padding:20px; background:#f8f8f8; border-radius:10px;">
      <h3 id="account-title">Konto erstellen?</h3>
      <p id="account-text">Für einfache Nachverfolgung und zukünftige Bestellungen.</p>
      <a href="#" id="create-account-btn" class="btn btn-primary">Konto erstellen</a>
    </div>
  </main>

<script>
// === Recuperar datos de la sesión de Stripe ===
async function retrieveSession() {
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get('session_id');

  if (!sessionId) {
    document.getElementById('order-summary').innerHTML = "<p style='color:red;'>Error: No se encontró sesión de pago.</p>";
    return;
  }

  try {
    const response = await fetch('https://1000malbecs-pago.federico-augspach.workers.dev/get-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });

    const data = await response.json();

    // Rellenar número de pedido
    document.getElementById('order-number').textContent = data.id?.slice(-8) || sessionId.slice(-8);

    // Resumen de productos
    let html = `<h3>Bestellübersicht</h3>`;
    if (data.items && data.items.length) {
      data.items.forEach(item => {
        html += `<p>${item.quantity} × ${item.description || 'Producto'} — €${(item.amount/100).toFixed(2)}</p>`;
      });
    }
    html += `<hr><p><strong>Gesamt: €${(data.total || 0).toFixed(2)}</strong></p>`;
    document.getElementById('order-summary').innerHTML = html;

    // Dirección de envío
    if (data.shipping_details) {
      const sd = data.shipping_details;
      document.getElementById('shipping-info').innerHTML = `
        <strong>Versandadresse:</strong><br>
        ${sd.name || ''}<br>
        ${sd.address?.line1 || ''}<br>
        ${sd.address?.city || ''}, ${sd.address?.postal_code || ''}<br>
        ${sd.address?.country || ''}
      `;
    }

    // Enlace para crear cuenta
    if (data.customer_email) {
      document.getElementById('create-account-btn').href = `/register.html?email=${encodeURIComponent(data.customer_email)}`;
    }

  } catch (error) {
    console.error(error);
    document.getElementById('order-summary').innerHTML = "<p>Es gab ein Problem beim Laden der Bestellung.</p>";
  }
}

// Ejecutar
document.addEventListener('DOMContentLoaded', retrieveSession);

function downloadInvoice() {
  alert("Descargando factura... (conectar con backend)");
}
</script>
</body>
</html>
